spring:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true

  datasource:
    url: jdbc:h2:mem:weatherdb
    username: sa
    password:

logging:
  level:
    root: INFO
    com.weatherspring: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

weather:
  api:
    base-url: https://api.weatherapi.com/v1
    key: ${WEATHER_API_KEY:your-api-key-here}
