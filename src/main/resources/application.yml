spring:
  application:
    name: weather-service

  profiles:
    active: dev

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  datasource:
    url: jdbc:h2:file:./data/weatherdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=300s

server:
  port: 8080
  servlet:
    context-path: /
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# Weather API Configuration
weather:
  api:
    base-url: https://api.weatherapi.com/v1
    key: ${WEATHER_API_KEY:your-api-key-here}
    timeout: 5000
    cache:
      current-weather-ttl: 300
      forecast-ttl: 3600
      location-ttl: 900

# Logging Configuration
logging:
  level:
    root: INFO
    com.weatherspring: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# API Documentation
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
