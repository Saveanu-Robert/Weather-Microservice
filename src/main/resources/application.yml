spring:
  application:
    name: weather-service

  # Virtual Threads (Java 21+ feature, using Java 25 LTS) - Massive concurrency improvement
  # Handles 10,000+ concurrent requests vs 200 with platform threads
  threads:
    virtual:
      enabled: true

  profiles:
    active: dev

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # Flyway Database Migrations
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    validate-on-migrate: true

  h2:
    console:
      enabled: false # Disabled by default - enable in dev profile only
      path: /h2-console
      settings:
        web-allow-others: false

  datasource:
    url: jdbc:h2:file:./data/weatherdb
    driver-class-name: org.h2.Driver
    username: sa
    password:  # Empty password acceptable for H2 file database (dev/test only)

  cache:
    type: caffeine
    # Cache configuration is managed programmatically in CacheConfig.java
    # to allow different TTL values for different cache types (currentWeather: 5min, forecasts: 1h, locations: 15min)

server:
  port: 8080
  servlet:
    context-path: /
  shutdown: graceful
  # Response compression for performance
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css
    min-response-size: 1024

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers,circuitbreakerevents
      base-path: /actuator
    enabled-by-default: false
  endpoint:
    health:
      enabled: true
      show-details: when-authorized
      roles: ACTUATOR_ADMIN
    info:
      enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      environment: ${spring.profiles.active}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  health:
    circuitbreakers:
      enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:0.1}  # Default 10% sampling (override to 1.0 in dev)
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

# Resilience4j Circuit Breaker Configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        # Circuit opens when 50% of requests fail
        failureRateThreshold: 50
        # Minimum number of calls before circuit breaker starts working
        minimumNumberOfCalls: 5
        # Time circuit stays open before attempting to recover
        waitDurationInOpenState: 10s
        # Number of calls in half-open state to test recovery
        permittedNumberOfCallsInHalfOpenState: 3
        # Sliding window size for failure rate calculation
        slidingWindowSize: 10
        slidingWindowType: COUNT_BASED
        # Slow call threshold - consider call slow if >60% exceed duration threshold
        slowCallRateThreshold: 60
        # API calls taking longer than 3 seconds are considered slow
        slowCallDurationThreshold: 3s
        # Record exceptions as failures
        recordExceptions:
          - com.weatherspring.exception.WeatherApiException
          - java.io.IOException
          - java.util.concurrent.TimeoutException
    instances:
      weatherApi:
        baseConfig: default
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
        minimumNumberOfCalls: 10
      weatherApiCurrent:
        baseConfig: default
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
        minimumNumberOfCalls: 10
      weatherApiForecast:
        baseConfig: default
        failureRateThreshold: 50
        waitDurationInOpenState: 20s  # Slightly longer for forecasts
        minimumNumberOfCalls: 10
        slowCallDurationThreshold: 5s  # Forecasts can take longer

  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - com.weatherspring.exception.WeatherApiException
          - java.io.IOException
    instances:
      weatherApi:
        baseConfig: default
        maxAttempts: 3
        waitDuration: 500ms
      weatherApiCurrent:
        baseConfig: default
        maxAttempts: 3
        waitDuration: 500ms
      weatherApiForecast:
        baseConfig: default
        maxAttempts: 2  # Fewer retries for forecasts (larger payloads)
        waitDuration: 1s

  ratelimiter:
    configs:
      default:
        # Limit to prevent exceeding external API quotas
        limitForPeriod: 100  # Max 100 calls
        limitRefreshPeriod: 1m  # Per minute
        timeoutDuration: 5s  # Wait up to 5s for permission
    instances:
      weatherApi:
        baseConfig: default
        limitForPeriod: 50  # Conservative limit for free tier
        limitRefreshPeriod: 1m
      weatherApiCurrent:
        baseConfig: default
        limitForPeriod: 50
        limitRefreshPeriod: 1m
      weatherApiForecast:
        baseConfig: default
        limitForPeriod: 30  # Lower limit for data-intensive forecasts
        limitRefreshPeriod: 1m

# Weather API Configuration
weather:
  api:
    base-url: https://api.weatherapi.com/v1
    key: ${WEATHER_API_KEY} # REQUIRED - no fallback for security
    timeout: 5000
    cache:
      current-weather-ttl: 300
      forecast-ttl: 3600
      location-ttl: 900

# Application Error Configuration
app:
  async:
    # Timeout for async bulk operations in seconds (default: 60)
    timeout-seconds: 60
  error:
    problem-base-url: ${ERROR_PROBLEM_BASE_URL:https://weatherspring.com/problems}

# Logging Configuration with Correlation ID
logging:
  level:
    root: INFO
    com.weatherspring: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId:-}] [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId:-}] [%thread] %-5level %logger{36} - %msg%n"

# API Documentation
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# OpenAPI Configuration
openapi:
  contact:
    email: ${OPENAPI_CONTACT_EMAIL:support@weatherservice.com}
  server:
    url: ${OPENAPI_SERVER_URL:http://localhost:8080}

# Thread Pool Configuration
thread-pool:
  platform:
    core-pool-size: ${PLATFORM_EXECUTOR_CORE_POOL_SIZE:10}
    max-pool-size: ${PLATFORM_EXECUTOR_MAX_POOL_SIZE:50}
    queue-capacity: ${PLATFORM_EXECUTOR_QUEUE_CAPACITY:500}
    await-termination-seconds: ${PLATFORM_EXECUTOR_AWAIT_TERMINATION:30}
