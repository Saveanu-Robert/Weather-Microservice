version: '3.8'

services:
  weather-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - APP_PORT=${APP_PORT:-8080}
    container_name: weather-microservice
    ports:
      - "${APP_PORT:-8080}:${APP_PORT:-8080}"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - WEATHER_API_KEY=${WEATHER_API_KEY:-your-api-key-here}
      - SERVER_PORT=${APP_PORT:-8080}
      - DATABASE_URL=jdbc:h2:file:/data/weatherdb
      - DATABASE_USERNAME=sa
      - DATABASE_PASSWORD=
    volumes:
      - weather-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:${APP_PORT:-8080}/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    networks:
      - weather-network

volumes:
  weather-data:
    driver: local

networks:
  weather-network:
    driver: bridge
